<!DOCTYPE html>

 <link rel="icon" type="image/png" href="icon/icon.png.png">

<title>Hora de aventuras</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #1a1a2e;
    color: #f1f1f1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
 
.contenido-config {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  margin: auto;
  /* Añadimos mucho más espacio (padding) abajo para engañar a iOS */
  padding: 1.2rem 1.2rem 6rem 1.2rem; 
}
 
  .vista { display: none; padding: 1.2rem; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  .vista.activa { display: flex; flex-direction: column; }
  h1 { font-size: 1.3rem; text-align: center; margin: 0 0 1.2rem; }
  h2 { font-size: 1rem; color: #a29bfe; margin: 1.2rem 0 0.4rem; }

  input, select {
    width: 100%;
    padding: 0.65rem;
    border-radius: 10px;
    border: 1px solid #444;
    background: #2c2c54;
    color: #fff;
    font-size: 1rem;
    margin-bottom: 0.6rem;
  }
  button {
    background: #6c63ff;
    color: white;
    border: none;
    padding: 0.75rem 1.2rem;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;

  }
  button.secundario { background: transparent; border: 1px solid #6c63ff; }
  button:active { transform: scale(0.98); }

  .nombre-turno { text-align: center; font-size: 1.4rem; font-weight: 600; margin: 0.6rem 0 1.2rem; }

  .mazo-boton {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.9rem; margin-bottom: 0.6rem; border-radius: 14px;

  }
  .mazo-prismo { background: linear-gradient(135deg,#8e6bff,#4834d4); }
  .mazo-lich { background: linear-gradient(135deg,#2c5f4a,#0d2b21); }
  .mazo-caracol { background: linear-gradient(135deg,#20a89e,#0f5a54); }
  .mazo-boton .icono { font-size: 1.4rem; }
  .mazo-boton .sub { font-weight: 400; font-size: 0.75rem; opacity: 0.85; display: block; }

  .carta-juego {
    background: #f4f1ff; color: #2c2c54; border-radius: 16px;
    padding: 1.5rem; text-align: center; margin: 1rem 0; min-height: 140px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem;
  }
  .carta-juego .tipo { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c63ff; font-weight: 700; }
  .carta-juego .texto { font-size: 1.05rem; font-weight: 500; }

  .footer-link { text-align: center; margin-top: 1.5rem; }
  .footer-link a { color: #666; font-size: 0.8rem; }

/* ---------- CONFIGURACION ---------- */
/* Igual que bienvenida: ocupa toda la pantalla para que el vídeo de fondo
   cubra el 100%. El contenido real va dentro de .contenido-config, que sí
   mantiene el ancho máximo de 480px y queda centrado por encima del vídeo. */
#vista-config {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  max-width: none;
  margin: 0;
  overflow-y: auto;
  overflow-x: hidden;
}


.fondo-video-config {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  background-color: #1a1a2e; /* color de respaldo mientras carga el vídeo */
}

.contenido-config {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  margin: auto; /* Al poner solo 'auto', se centra vertical y horizontalmente sin romper el scroll */
  padding: 1.2rem;
}
/* Tema automático: se añade por JS según el brillo medio del fondo activo.
   Por defecto (sin fondo, o fondo oscuro) se usan los colores actuales (claros sobre oscuro). */
#vista-config.tema-claro h1 { color: #1a1a2e; }
#vista-config.tema-claro input {
  background: rgba(255,255,255,0.85);
  color: #1a1a2e;
  border-color: #bbb;
}
#vista-config.tema-claro input::placeholder { color: #555; }
#vista-config.tema-claro button.secundario {
  border-color: #1a1a2e;
  color: #1a1a2e;
}
#vista-config.tema-claro .btn-quitar-jugador {
  border: 2px solid #fff;
}

/* ---------- SELECTOR DE PERSONAJES ---------- */
/* ---------- SELECTOR DE PERSONAJES ---------- */
.jugador-config {
  margin-bottom: 1.4rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.personajes-grid {
  display: flex;
  gap: 0.7rem;
  overflow-x: auto;
  padding: 0.4rem 0.1rem 0.8rem; /* Un poco más de espacio por debajo para la barra */
  
  /* Estilos para Firefox */
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
}

/* Estilos de la barra para Chrome, Safari y Edge */
.personajes-grid::-webkit-scrollbar {
  height: 6px; /* Altura de la barra horizontal */
}
.personajes-grid::-webkit-scrollbar-track {
  background: transparent; /* El carril por donde se mueve es transparente */
}
.personajes-grid::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.2); /* Color blanco semitransparente disimulado */
  border-radius: 10px; /* Bordes redondeaditos */
}
.personajes-grid::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.4); /* Se ilumina un poquito al pasar el dedo o ratón */
}

.personaje-avatar {
  all: unset;
  flex: 0 0 auto;
  width: 62px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.personaje-avatar .icono-circular {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid transparent;
  background: #2c2c54;
  display: flex;
  align-items: center;
  justify-content: center;
}
.personaje-avatar img { width: 100%; height: 100%; object-fit: cover; }
.personaje-avatar span {
  font-size: 0.68rem;
  color: #ccc;
  text-align: center;
  line-height: 1.1;
}

.personaje-avatar:hover { opacity: 0.85; }

.personaje-avatar.seleccionado {
  opacity: 1;
  transform: scale(1.08);
}
.personaje-avatar.seleccionado .icono-circular {
  border-color: #6c63ff;
}
.personaje-avatar.seleccionado span { color: #fff; font-weight: 600; }

.personaje-avatar.ocupado {
  opacity: 0.25;
  cursor: not-allowed;
  pointer-events: none;
}
 
/* ---------- BIENVENIDA ---------- */
/* Esta vista escapa del ancho máximo de 480px: ocupa TODA la pantalla
   (position: fixed, inset 0) para poder usarse como fondo a pantalla completa
   tanto en móvil como en escritorio. */
#vista-bienvenida {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  max-width: none;
  margin: 0;
  padding: 0;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  /* La imagen de fondo se controla por JS (configurarFondoBienvenida),
     pero dejamos aquí los valores por defecto para que siempre cubra todo */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #1a1a2e; /* color de respaldo mientras carga la imagen */
}

.texto-toca {
  /* Centrado en el eje horizontal, y colocado en la mitad del primer
     cuarto de pantalla empezando desde abajo (12.5% desde el borde inferior) */
  position: absolute;
  bottom: 12.5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
  color: #fff;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  animation: parpadeoToca 1.6s ease-in-out infinite;
  pointer-events: none;
  text-align: center;
  white-space: nowrap;
}

@keyframes parpadeoToca {
  0%, 100% { opacity: 0.55; }
  50% { opacity: 1; }
}

.logo-nube {
  position: absolute;
  top: 37.5%;
  left: 50%;
  width: 55%;
  max-width: 320px;
  z-index: 1;
  pointer-events: none;
  animation:
    entradaNube 1.8s ease-out forwards,
    flotarNube 4s ease-in-out 1.8s infinite;
}

@keyframes entradaNube {
  0%   { transform: translate(-50%, -140vh); opacity: 0; }
  55%  { opacity: 1; }
  100% { transform: translate(-50%, 0); opacity: 1; }
}

@keyframes flotarNube {
  0%, 100% { transform: translate(-50%, 0); }
  50%      { transform: translate(-50%, -14px); }
}
 
/* ---------- BARRIDO NEGRO ---------- */
.barrido-negro {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 2000;
  transform: scaleX(0);
  transform-origin: left;
  pointer-events: none;
}
.barrido-negro.entrando {
  animation: barridoEntra 0.4s ease-in forwards;
}
.barrido-negro.saliendo {
  transform-origin: right;
  animation: barridoSale 0.4s ease-in forwards;
}
@keyframes barridoEntra {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
@keyframes barridoSale {
  from { transform: scaleX(1); }
  to { transform: scaleX(0); }
}

/* ---------- CAMPOS NOMBRE ---------- */
.campo-nombre-wrap {
  position: relative;
  margin-bottom: 0.6rem;
}
.campo-nombre-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
.btn-quitar-jugador {
  position: absolute;
  right: 0.4rem;
  top: 50%;
  transform: translateY(-50%);
  width: 2.2rem;   /* Más grande para que sea fácil de tocar */
  height: 2.2rem;  /* Más grande para que sea fácil de tocar */
  border-radius: 50%;
  background: #ff4757;
  color: #fff;
  border: none;
  font-size: 1.2rem;
  line-height: 1;
  padding: 0;
  margin: 0;
  cursor: pointer;
  z-index: 10; /* Asegura que no sea bloqueado por el input */
}
 .btn-quitar-jugador:active {
  transform: translateY(-50%) scale(0.92); 
}

/* ---------- MAZOS CIRCULARES ---------- */
.mazos-contenedor {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  align-items: center;
}
.mazo-circular {
  display: flex;
  align-items: center;
  gap: 1rem;
  width: 100%;
  max-width: 320px;
  padding: 0.5rem;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  color: white;
  text-align: left;
}
.mazo-circular .icono-circular {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.mazo-circular .icono-circular img {
  width: 70%;
  height: 70%;
  object-fit: contain;
}
.mazo-circular .texto-mazo { display: flex; flex-direction: column; }
.mazo-circular .texto-mazo .nombre-mazo { font-weight: 700; font-size: 1rem; }
.mazo-circular .texto-mazo .sub { font-weight: 400; font-size: 0.75rem; opacity: 0.85; }

.mazo-prismo { background: linear-gradient(135deg,#8e6bff,#4834d4); }
.mazo-glitch { background: linear-gradient(135deg,#2c5f4a,#0d2b21); }
.mazo-caracol { background: linear-gradient(135deg,#20a89e,#0f5a54); }

/* Móvil: solo icono circular, en columna, sin texto */
@media (max-width: 600px) {
  .mazo-circular { justify-content: center; max-width: 100px; padding: 0; border-radius: 50%; }
  .mazo-circular .texto-mazo { display: none; }
  .mazo-circular .icono-circular { width: 80px; height: 80px; }
  .mazos-contenedor { flex-direction: column; }
}

/* Escritorio: también en columna, iconos circulares, sin texto (según lo pedido) */
@media (min-width: 601px) {
  .mazos-contenedor { flex-direction: column; align-items: center; }
  .mazo-circular { justify-content: center; max-width: 110px; padding: 0; border-radius: 50%; }
  .mazo-circular .texto-mazo { display: none; }
  .mazo-circular .icono-circular { width: 90px; height: 90px; }
}


.btn-musica {
  position: fixed !important;
  top: 1rem;
  right: 1rem;
  z-index: 999;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  overflow: hidden;

  /* Oculto hasta que se pase de la pantalla de bienvenida */
  display: none;
}

.btn-musica.visible { display: block; }

.btn-musica img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* Línea diagonal que aparece cuando está silenciado */
.btn-musica::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 8%;
  width: 84%;
  height: 3px;
  background: #ff4757;
  transform: translateY(-50%) rotate(-45deg);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.btn-musica.silenciado::after {
  opacity: 1;
}
  
</style>

<script>
// ====================== CONTENIDO EDITABLE ======================
const VENTAJAS = [
  "Avanza dos casillas", "Repite turno", "Inmune a la próxima desventaja",
  "Roba una carta a otro jugador", "Elige tu próxima casilla", "Doble puntos esta ronda"
];
const DESVENTAJAS = [
  "Pierdes un turno", "Retrocede tres casillas", "Vuelve a la casilla de salida",
  "No puedes hablar hasta tu próximo turno", "Cambia de sitio con otro jugador"
];

// Imágenes de fondo de la pantalla de bienvenida (carpeta "bienvenida")
// Ajusta estas rutas si tus archivos se llaman de otra forma.
const IMG_BIENVENIDA_ESCRITORIO = "bienvenida/portatil.jpg";
const IMG_BIENVENIDA_MOVIL = "bienvenida/movil.jpg";

// ====================== ESTADO ======================
let estado = cargarEstado();

function cargarEstado() {
  const g = localStorage.getItem("estadoJuegoTurnos");
  return g ? JSON.parse(g) : null;
}
function guardarEstado() { localStorage.setItem("estadoJuegoTurnos", JSON.stringify(estado)); }
function mezclar(arr) { return arr.map(v => [Math.random(), v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }

// ====================== VISTAS ======================
function mostrarVista(id) {
  document.querySelectorAll(".vista").forEach(v => v.classList.remove("activa"));
  document.getElementById("vista-" + id).classList.add("activa");
}

// ====================== CONFIGURACION ======================
const camposNombres = document.getElementById("camposNombres");

document.getElementById("btnListo").addEventListener("click", () => {
  const nombres = [];
  // Seleccionamos todos los inputs
  const inputs = document.querySelectorAll("#camposNombres input");
  
  // Recorremos cada input directamente
  inputs.forEach((input, index) => {
    const val = input.value.trim();
    nombres.push(val || ("Jugador " + (index + 1)));
  });

  const jugadores = nombres.map((nombre, id) => ({ id, nombre }));

  estado = {
    jugadores,
    turnoIndex: 0,
    poolVentaja: mezclar([...VENTAJAS]),
    poolDesventaja: mezclar([...DESVENTAJAS]),
    poolCaracol: mezclar([...VENTAJAS.map(t=>({texto:t,tipo:"Ventaja"})), ...DESVENTAJAS.map(t=>({texto:t,tipo:"Desventaja"}))])
  };
  guardarEstado();

  transicionABarrido(() => {
    irAMenuTurno();
  });
});

// ====================== MENU DE TURNO ======================
function jugadorActual() { return estado.jugadores[estado.turnoIndex % estado.jugadores.length]; }

function irAMenuTurno() {
  mostrarVista("menu");
  document.getElementById("nombreTurno").textContent = jugadorActual().nombre;
}

document.querySelectorAll(".mazo-circular").forEach(btn => {
  btn.addEventListener("click", () => sacarCarta(btn.dataset.mazo));
});

function sacarCarta(mazo) {
  const jugador = jugadorActual();
  let tipo = "", texto = "";

  if (mazo === "ventaja") {
    if (estado.poolVentaja.length === 0) estado.poolVentaja = mezclar([...VENTAJAS]);
    texto = estado.poolVentaja.pop();
    tipo = "Ventaja";
  } else if (mazo === "desventaja") {
    if (estado.poolDesventaja.length === 0) estado.poolDesventaja = mezclar([...DESVENTAJAS]);
    texto = estado.poolDesventaja.pop();
    tipo = "Desventaja";
  } else if (mazo === "caracol") {
    if (estado.poolCaracol.length === 0) {
      estado.poolCaracol = mezclar([...VENTAJAS.map(t=>({texto:t,tipo:"Ventaja"})), ...DESVENTAJAS.map(t=>({texto:t,tipo:"Desventaja"}))]);
    }
    const c = estado.poolCaracol.pop();
    texto = c.texto; tipo = c.tipo;
  }

  guardarEstado();
  document.getElementById("tituloCartaVista").textContent = jugador.nombre;
  document.getElementById("tipoCartaJuego").textContent = tipo;
  document.getElementById("textoCartaJuego").textContent = texto;
  mostrarVista("carta");
}

document.getElementById("btnSiguienteTurno").addEventListener("click", () => {
  estado.turnoIndex = (estado.turnoIndex + 1) % estado.jugadores.length;
  guardarEstado();
  irAMenuTurno();
});

// ====================== REINICIAR ======================
document.getElementById("btnReiniciarTodo").addEventListener("click", (e) => {
  e.preventDefault();
  if (confirm("¿Borrar la partida y empezar de cero?")) {
    localStorage.removeItem("estadoJuegoTurnos");
    location.reload();
  }
});

// ====================== DETECCION DE DISPOSITIVO ======================
function esMovilVertical() {
  return window.matchMedia("(orientation: portrait)").matches;
}

// ====================== FONDO DE LA BIENVENIDA (IMAGEN, NO VIDEO) ======================
function configurarFondoBienvenida() {
  const vista = document.getElementById("vista-bienvenida");
  const imagen = esMovilVertical() ? IMG_BIENVENIDA_MOVIL : IMG_BIENVENIDA_ESCRITORIO;
  vista.style.backgroundImage = `url("${imagen}")`;
}

configurarFondoBienvenida();
let orientacionActual = esMovilVertical();

// ====================== TEMA AUTOMÁTICO SEGÚN EL FONDO ======================
// Analiza el brillo medio de una imagen de fondo y añade la clase "tema-claro"
// o "tema-oscuro" a la vista indicada, para que el texto y los botones se
// vean siempre bien sin tener que elegir el color a mano.
// Uso: aplicarTemaSegunImagen("vista-config", "config/fondo1.jpg");
function aplicarTemaSegunImagen(idVista, imagenSrc) {
  const vista = document.getElementById(idVista);
  if (!vista) return;

  if (!imagenSrc) {
    vista.classList.remove("tema-claro", "tema-oscuro");
    return;
  }

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    const tam = 24;
    const canvas = document.createElement("canvas");
    canvas.width = tam;
    canvas.height = tam;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, tam, tam);
    try {
      const datos = ctx.getImageData(0, 0, tam, tam).data;
      let total = 0;
      for (let i = 0; i < datos.length; i += 4) {
        total += 0.299 * datos[i] + 0.587 * datos[i + 1] + 0.114 * datos[i + 2];
      }
      const brillo = total / (tam * tam); // 0 = negro, 255 = blanco
      if (brillo > 150) {
        vista.classList.add("tema-claro");
        vista.classList.remove("tema-oscuro");
      } else {
        vista.classList.add("tema-oscuro");
        vista.classList.remove("tema-claro");
      }
    } catch (e) {
      // Si el navegador no deja leer los píxeles (por CORS), usamos tema oscuro por defecto
      vista.classList.add("tema-oscuro");
    }
  };
  img.src = imagenSrc;
}

// Igual que aplicarTemaSegunImagen, pero toma el fotograma actual de un
// elemento <video> ya cargado (se usa para los vídeos de fondo de configuración).
function aplicarTemaSegunVideo(idVista, videoEl) {
  const vista = document.getElementById(idVista);
  if (!vista || !videoEl) return;

  const tam = 24;
  const canvas = document.createElement("canvas");
  canvas.width = tam;
  canvas.height = tam;
  const ctx = canvas.getContext("2d");
  try {
    ctx.drawImage(videoEl, 0, 0, tam, tam);
    const datos = ctx.getImageData(0, 0, tam, tam).data;
    let total = 0;
    for (let i = 0; i < datos.length; i += 4) {
      total += 0.299 * datos[i] + 0.587 * datos[i + 1] + 0.114 * datos[i + 2];
    }
    const brillo = total / (tam * tam); // 0 = negro, 255 = blanco
    if (brillo > 150) {
      vista.classList.add("tema-claro");
      vista.classList.remove("tema-oscuro");
    } else {
      vista.classList.add("tema-oscuro");
      vista.classList.remove("tema-claro");
    }
  } catch (e) {
    // Si el navegador no deja leer los píxeles (por CORS), usamos tema oscuro por defecto
    vista.classList.add("tema-oscuro");
  }
}

// Rutas de los vídeos de fondo para la vista de configuración
const VIDEOS_CONFIG_ESCRITORIO = ["iniciopc/fondopc.mp4"];
const VIDEOS_CONFIG_MOVIL = [
  "iniciomovil/fondo1-movil.mp4.mp4",
  "iniciomovil/fondo2-movil.mp4.mp4",
  "iniciomovil/fondo3-movil.mp4.mp4",
  "iniciomovil/fondo4-movil.mp4.mp4",
  "iniciomovil/fondo5-movil.mp4.mp4",
  "iniciomovil/fondo6-movil.mp4.mp4"
];

function elegirAleatorio(lista) {
  return lista[Math.floor(Math.random() * lista.length)];
}

// Elige un vídeo al azar (según si es móvil o escritorio), lo pone de fondo
// en la vista de configuración y, en cuanto tiene un fotograma listo,
// calcula el tema de color (claro/oscuro) automáticamente.
function configurarFondoConfig() {
  const video = document.getElementById("fondoVideoConfig");
  const lista = esMovilVertical() ? VIDEOS_CONFIG_MOVIL : VIDEOS_CONFIG_ESCRITORIO;
  video.src = elegirAleatorio(lista);
  video.muted = true;
  video.load();
  video.play().catch(() => {
    // Si el navegador bloquea el autoplay, no pasa nada especial;
    // el vídeo se queda parado en el primer fotograma.
  });
  video.addEventListener("loadeddata", () => aplicarTemaSegunVideo("vista-config", video), { once: true });
}

configurarFondoConfig();

window.addEventListener("resize", () => {
  const nuevaOrientacion = esMovilVertical();
  if (nuevaOrientacion !== orientacionActual) {
    orientacionActual = nuevaOrientacion;
    configurarFondoBienvenida();
    configurarFondoConfig();
  }
});

function crearCampoNombre(indice) {
  const wrap = document.createElement("div");
  wrap.className = "jugador-config";

  const inputWrap = document.createElement("div");
  inputWrap.className = "campo-nombre-wrap";

  const input = document.createElement("input");
  input.placeholder = "Nombre jugador " + (indice + 1);
  inputWrap.appendChild(input);

  if (indice >= 2) {
    const btnQuitar = document.createElement("button");
    btnQuitar.className = "btn-quitar-jugador";
    btnQuitar.textContent = "✕";
    btnQuitar.type = "button";
    inputWrap.appendChild(btnQuitar);
  }
  wrap.appendChild(inputWrap);

  const grid = document.createElement("div");
  grid.className = "personajes-grid";
  grid.dataset.indice = indice;

  PERSONAJES.forEach(p => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "personaje-avatar";
    btn.dataset.personaje = p.id;
    btn.innerHTML = `<span class="icono-circular"><img src="${p.img}" alt="${p.nombre}"></span><span>${p.nombre}</span>`;
    grid.appendChild(btn);
  });

  wrap.appendChild(grid);
  return wrap;
}

// Delegación de eventos para borrar jugadores
camposNombres.addEventListener("click", (e) => {
  const btn = e.target.closest(".btn-quitar-jugador");
  if (!btn) return;
  
  // ¡AQUÍ ESTABA EL ERROR! Ahora borraremos todo el bloque del jugador, no solo el nombre
  const wrap = btn.closest(".jugador-config"); 
  if (!wrap) return;

  wrap.remove();
  totalJugadores--;
  actualizarBotonAgregar();
  renombrarPlaceholders();
  
  // ¡NUEVO! Liberamos los personajes si el jugador que hemos borrado tenía uno
  actualizarDisponibilidadPersonajes();
});

function renombrarPlaceholders() {
  const campos = camposNombres.querySelectorAll(".campo-nombre-wrap input");
  campos.forEach((input, i) => {
    input.placeholder = "Nombre jugador " + (i + 1);
  });
}

function actualizarBotonAgregar() {
  const btnAgregar = document.getElementById("btnAgregarJugador");
  btnAgregar.style.display = totalJugadores >= 6 ? "none" : "block";
}

function actualizarCamposNombres() {
  camposNombres.innerHTML = "";
  for (let i = 0; i < totalJugadores; i++) {
    camposNombres.appendChild(crearCampoNombre(i));
  }
  actualizarBotonAgregar();
}

// ESTE ES EL EVENTO QUE ESTABA DUPLICADO. AHORA SOLO HAY UNO.
document.getElementById("btnAgregarJugador").addEventListener("click", () => {
  if (totalJugadores >= 6) return;
  totalJugadores++;
  actualizarCamposNombres();
});

// Inicializamos la vista por primera vez
actualizarCamposNombres();

 camposNombres.addEventListener("click", (e) => {
  const avatarBtn = e.target.closest(".personaje-avatar");
  if (avatarBtn) {
    if (avatarBtn.classList.contains("ocupado")) return;
    const grid = avatarBtn.closest(".personajes-grid");
    const yaEstaba = avatarBtn.classList.contains("seleccionado");
    grid.querySelectorAll(".personaje-avatar").forEach(b => b.classList.remove("seleccionado"));
    if (!yaEstaba) avatarBtn.classList.add("seleccionado");
    actualizarDisponibilidadPersonajes();
  }
});

function actualizarDisponibilidadPersonajes() {
  const grids = camposNombres.querySelectorAll(".personajes-grid");
  const elegidos = [];
  grids.forEach(grid => {
    const sel = grid.querySelector(".personaje-avatar.seleccionado");
    if (sel) elegidos.push(sel.dataset.personaje);
  });
  grids.forEach(grid => {
    grid.querySelectorAll(".personaje-avatar").forEach(btn => {
      const esDeOtro = elegidos.includes(btn.dataset.personaje) && !btn.classList.contains("seleccionado");
      btn.classList.toggle("ocupado", esDeOtro);
    });
  });
}

 document.getElementById("btnListo").addEventListener("click", () => {
  const jugadores = [];
  document.querySelectorAll(".jugador-config").forEach((wrap, i) => {
    const nombre = wrap.querySelector("input").value.trim() || ("Jugador " + (i + 1));
    const seleccionado = wrap.querySelector(".personaje-avatar.seleccionado");
    const personaje = seleccionado ? seleccionado.dataset.personaje : null;
    jugadores.push({ id: i, nombre, personaje });
  });

  estado = {
    jugadores,
    turnoIndex: 0,
    poolVentaja: mezclar([...VENTAJAS]),
    poolDesventaja: mezclar([...DESVENTAJAS]),
    poolCaracol: mezclar([...VENTAJAS.map(t=>({texto:t,tipo:"Ventaja"})), ...DESVENTAJAS.map(t=>({texto:t,tipo:"Desventaja"}))])
  };
  guardarEstado();

  transicionABarrido(() => { irAMenuTurno(); });
});
 
// ====================== BARRIDO NEGRO ENTRE VISTAS ======================
function transicionABarrido(callback) {
  const barrido = document.getElementById("barridoNegro");
  barrido.classList.remove("saliendo");
  barrido.classList.add("entrando");
  setTimeout(() => {
    callback();
    barrido.classList.remove("entrando");
    barrido.classList.add("saliendo");
    setTimeout(() => barrido.classList.remove("saliendo"), 400);
  }, 400);
}
 
 // ====================== ARRANQUE ======================
if (estado) {
  // Si ya había una partida guardada, saltamos directamente al menú de turno
  // y mostramos el icono de música (porque ya no estamos en bienvenida).
  btnMusica.classList.add("visible");
  irAMenuTurno();
}
