<!DOCTYPE html>
<html lang="es">
<head>
 <link rel="icon" type="image/png" href="icon/icon.png.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hora de aventuras</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #1a1a2e;
    color: #f1f1f1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
 
  .vista { 
  display: none; 
  padding: 1.2rem; 
  width: 100%;       /* Asegura el ancho */
  min-height: 100vh; /* Asegura el alto mínimo */
  margin: 0 auto; 
  flex-direction: column;
}  
 
 .vista.activa { display: flex; flex-direction: column; }
  h1 { font-size: 1.3rem; text-align: center; margin: 0 0 1.2rem; }
  h2 { font-size: 1rem; color: #a29bfe; margin: 1.2rem 0 0.4rem; }

  input, select {
    width: 100%;
    padding: 0.65rem;
    border-radius: 10px;
    border: 1px solid #444;
    background: #2c2c54;
    color: #fff;
    font-size: 1rem;
    margin-bottom: 0.6rem;
  }
  button {
    background: #6c63ff;
    color: white;
    border: none;
    padding: 0.75rem 1.2rem;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    margin-top: 0.5rem;
  }
  button.secundario { background: transparent; border: 1px solid #6c63ff; }
  button:active { transform: scale(0.98); }

 
/* ---------- BIENVENIDA ---------- */
#vista-bienvenida {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  max-width: none;
  margin: 0;
  padding: 0;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background-color: #1a1a2e;
  
  /* Definimos una variable CSS vacía por defecto */
  --fondo-bienvenida: none;
}

#vista-bienvenida::before,
#vista-bienvenida::after {
  content: "";
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
#vista-bienvenida::before {
  background-image: var(--fondo-bienvenida);
  z-index: 0;
}
#vista-bienvenida::after {
  background-image: var(--fondo-bienvenida-next, var(--fondo-bienvenida));
  opacity: 0;
  transition: opacity 0.6s ease-in-out;
  z-index: 1;
}
#vista-bienvenida.cambiando-fondo::after {
  opacity: 1;
}

.logonube, .texto-toca {
  z-index: 2 !important;
}
 
.texto-toca {
  /* Centrado en el eje horizontal, y colocado en la mitad del primer
     cuarto de pantalla empezando desde abajo (12.5% desde el borde inferior) */
  position: absolute;
  bottom: 12.5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
  color: #fff;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  animation: parpadeoToca 1.6s ease-in-out infinite;
  pointer-events: none;
  text-align: center;
  white-space: nowrap;
}

@keyframes parpadeoToca {
  0%, 100% { opacity: 0.55; }
  50% { opacity: 1; }
}

.logonube {
  position: absolute;
  top: 20%;
  left: 50%;
  width: 70%;
  max-width: 450px;
  z-index: 1;
  pointer-events: none;
  animation:
    entradaNube 1s ease-out forwards,
    flotarNube 4s ease-in-out 1s infinite;
}

@keyframes entradaNube {
  0%   { transform: translate(-50%, -140vh); opacity: 0; }
  55%  { opacity: 1; }
  100% { transform: translate(-50%, 0); opacity: 1; }
}

@keyframes flotarNube {
  0%, 100% { transform: translate(-50%, 0); }
  50%      { transform: translate(-50%, -14px); }
}

/* ---------- CONFIGURACION ---------- */
/* Igual que bienvenida: ocupa toda la pantalla para que el vídeo de fondo
   cubra el 100%. El contenido real va dentro de .contenido-config, que sí
   mantiene el ancho máximo de 480px y queda centrado por encima del vídeo. */
#vista-config {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  max-width: none;
  margin: 0;
  overflow-y: auto;
  overflow-x: hidden;
}

.fondo-video-config {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  background-color: #1a1a2e; /* color de respaldo mientras carga el vídeo */
}

.contenido-config {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 850px; /* <--- Cambiado de 480px a 800px para que quepa la fila */
  margin: auto;
  padding: 1.2rem 1.2rem 6rem 1.2rem; 
}
/* Tema automático: se añade por JS según el brillo medio del fondo activo.
   Por defecto (sin fondo, o fondo oscuro) se usan los colores actuales (claros sobre oscuro). */
#vista-config.tema-claro h1 { color: #1a1a2e; }
#vista-config.tema-claro input {
  background: rgba(255,255,255,0.85);
  color: #1a1a2e;
  border-color: #bbb;
}
#vista-config.tema-claro input::placeholder { color: #555; }
#vista-config.tema-claro button.secundario {
  border-color: #1a1a2e;
  color: #1a1a2e;
}
#vista-config.tema-claro .btn-quitar-jugador {
  border: 2px solid #fff;
}

/* ---------- SELECTOR DE PERSONAJES ---------- */
/* ---------- SELECTOR DE PERSONAJES (NUEVO ENFOQUE) ---------- */
.jugador-config {
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;  /* Siempre en vertical: nombre arriba, personajes abajo */
  align-items: center;     /* Centra el input y los personajes horizontalmente */
  justify-content: center;
  gap: 0.5rem;             /* Reducido para evitar espacios grandes entre nombre y avatares */
}

.personajes-grid {
  display: flex !important;
  flex-wrap: wrap !important;
  flex-direction: row !important;
  justify-content: center !important;
  align-items: flex-start !important;
  gap: 0.8rem 0.6rem !important;
  width: calc(4 * 62px + 3 * 0.6rem) !important;
  max-width: 100% !important;
  margin: 0 auto !important;
  padding: 0.4rem 0 !important;
  overflow: visible !important;
}

.personaje-avatar {
  all: unset;
  box-sizing: border-box !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  flex: 0 0 62px !important;
  width: 62px !important;
  max-width: 62px !important;
  gap: 0.3rem;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.15s ease, transform 0.15s ease;
}

@media (min-width: 650px) {
  .jugador-config {
    flex-direction: column;
    gap: 0.6rem;
  }

  .personajes-grid {
    width: calc(7 * 62px + 6 * 0.6rem) !important;
    margin: 0 auto !important;
  }
}
.jugador-config .campo-nombre-wrap {
  margin-bottom: 0;    /* Evita herencias verticales molestas */
}
 
.personaje-avatar .icono-circular {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid transparent;
  background: #2c2c54;
  display: flex;
  align-items: center;
  justify-content: center;
}
.personaje-avatar img { width: 100%; height: 100%; object-fit: cover; }
.personaje-avatar span {
  font-size: 0.68rem;
  color: #ccc;
  text-align: center;
  line-height: 1.1;
}

.personaje-avatar:hover { opacity: 0.85; }

.personaje-avatar.seleccionado {
  opacity: 1;
  transform: scale(1.08);
}
.personaje-avatar.seleccionado .icono-circular {
  border-color: #6c63ff;
}
.personaje-avatar.seleccionado span { color: #fff; font-weight: 600; }

.personaje-avatar.ocupado {
  opacity: 0.25;
  cursor: not-allowed;
  pointer-events: none;
}
/* ---------- CAMPOS NOMBRE ---------- */
.campo-nombre-wrap {
  position: relative;
  margin-bottom: 0 !important;
  width: 100%;
  max-width: 280px; /* Limitamos el ancho en móvil para que quede estético y centrado */
}

@media (min-width: 650px) {
  .jugador-config .campo-nombre-wrap {
    max-width: 240px; /* Tamaño controlado del cuadro de texto en PC */
  }
}
.campo-nombre-wrap input { margin-bottom: 0; padding-right: 2.5rem; }
.btn-quitar-jugador {
  position: absolute;
  right: 0.4rem;
  top: 50%;
  transform: translateY(-50%);
  width: 2.2rem;   /* Más grande para que sea fácil de tocar */
  height: 2.2rem;  /* Más grande para que sea fácil de tocar */
  border-radius: 50%;
  background: #ff4757;
  color: #fff;
  border: none;
  font-size: 1.2rem;
  line-height: 1;
  padding: 0;
  margin: 0;
  cursor: pointer;
  z-index: 10; /* Asegura que no sea bloqueado por el input */
}
 .btn-quitar-jugador:active {
  transform: translateY(-50%) scale(0.92); 
}

 /* ----------MUSICA--------- */
.btn-musica {
  position: fixed !important;
  top: 1rem;
  right: 1rem;
  z-index: 999;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  border: none;
  padding: 0;
  margin: 0;
  cursor: pointer;
  overflow: hidden;

  /* Oculto hasta que se pase de la pantalla de bienvenida */
  display: none;
}

.btn-musica.visible { display: block; }

.btn-musica img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
 transform: scale(1.1); /* Cambia 1.3 por 1.4 o 1.5 si lo quieres todavía más grande */
}

/* Línea diagonal que aparece cuando está silenciado */
.btn-musica::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 8%;
  width: 84%;
  height: 3px;
  background: #ff4757;
  transform: translateY(-50%) rotate(-45deg);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.btn-musica.silenciado::after {
  opacity: 1;
}
/* ---------- VISTA COMIC ---------- */
#vista-comic {
  position: relative;
  overflow: hidden;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
}
.comic-fondo {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-color: #1a1a2e;
  z-index: 0;
}
.comic-personaje {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  max-height: 72vh;
  max-width: 85%;
  object-fit: contain;
  z-index: 1;
  pointer-events: none;
}
/* "Golpe seco": sin transición en el propio cambio de imagen.
   El pequeño jitter simula el cambio brusco de expresión/pose. */
.comic-personaje.golpe {
  animation: golpeBrusco 0.18s steps(2, end);
}
@keyframes golpeBrusco {
  0%   { transform: translateX(-50%) translate(0, 0); }
  30%  { transform: translateX(-50%) translate(-3px, 1px); }
  60%  { transform: translateX(-50%) translate(3px, -1px); }
  100% { transform: translateX(-50%) translate(0, 0); }
}

.comic-bocadillo {
  position: absolute;
  top: 8%;
  left: 50%;
  width: min(85%, 480px);
  background: #fff;
  color: #1a1a2e;
  border-radius: 18px;
  padding: 1rem 1.2rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.45);
  z-index: 2;
  font-weight: 600;
  line-height: 1.3;
  text-align: center;
  transform-origin: center top;
  /* Estado por defecto: invisible/reducido */
  opacity: 0;
  transform: translateX(-50%) scale(0);
}
/* Cola del bocadillo */
.comic-bocadillo::after {
  content: "";
  position: absolute;
  bottom: -16px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 18px solid #fff;
}

/* Entrada: aparece con rebote y una leve rotación que se asienta */
.comic-bocadillo.entrando {
  animation: entradaBocadilloRebote 0.5s cubic-bezier(0.34,1.4,0.4,1) forwards;
}
@keyframes entradaBocadilloRebote {
  0%   { opacity: 0; transform: translateX(-50%) scale(0) rotate(-10deg); }
  55%  { opacity: 1; transform: translateX(-50%) scale(1.08) rotate(4deg); }
  80%  { transform: translateX(-50%) scale(0.97) rotate(-2deg); }
  100% { opacity: 1; transform: translateX(-50%) scale(1) rotate(0deg); }
}

/* Salida: se va achicando hasta desaparecer */
.comic-bocadillo.saliendo {
  animation: salidaBocadillo 0.28s ease-in forwards;
}
@keyframes salidaBocadillo {
  0%   { opacity: 1; transform: translateX(-50%) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateX(-50%) scale(0) rotate(6deg); }
}

.comic-toca {
  position: absolute;
  bottom: 4%;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 600;
  opacity: 0.7;
  z-index: 3;
  text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  animation: parpadeoToca 1.6s ease-in-out infinite;
  pointer-events: none;
}
 
/* ---------- VISTA SOBRE ---------- */
#vista-sobre {
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: background-color 0.4s ease;
}

.escena-sobre {
  position: relative;
  width: 260px;
  height: 180px;
  margin: 2rem auto 1rem;
}

/* --- El sobre --- */
.sobre {
  position: absolute;
  inset: 0;
  cursor: pointer;
  z-index: 3;
}
.sobre-cuerpo {
  position: absolute;
  inset: 0;
  background: #d8c9a3;
  border-radius: 6px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  z-index: 1;
}
/* Solapa triangular hecha con bordes */
.sobre-solapa {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0;
  margin: 0 auto;
  border-left: 130px solid transparent;
  border-right: 130px solid transparent;
  border-top: 90px solid #c7b489;
  transform-origin: top center;
  transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1);
  z-index: 4;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  pointer-events: none;
}
.sobre.abierto .sobre-solapa {
  transform: rotateX(-180deg);
}

/* --- La carta doblada dentro --- */
.carta-doblada {
  position: fixed;
  left: var(--carta-x, 50%);
  top: var(--carta-y, 50%);
  width: 190px;
  height: 24px;
  transform: translate(-50%, 0) scaleY(0.15);
  transform-origin: center top;
  background: #fdfaf3;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
  z-index: 2;
  transition: left 0.7s cubic-bezier(0.34,1.2,0.4,1),
              top 0.7s cubic-bezier(0.34,1.2,0.4,1),
              transform 0.7s cubic-bezier(0.34,1.2,0.4,1),
              height 0.7s cubic-bezier(0.34,1.2,0.4,1);
}
.carta-doblada img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Paso 1: la carta se despliega y sube fuera del sobre (misma posición x/y base) */
.escena-sobre.abierta .carta-doblada {
  transform: translate(-50%, -90px) scaleY(1);
  height: 230px;
  z-index: 5;
}

/* Paso 2: zoom, ahora centrada respecto a TODA la pantalla, no al sobre */
.escena-sobre.zoom .carta-doblada {
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(1.9);
  z-index: 950;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}
/* Fondo oscuro que aparece al hacer zoom, para centrar la atención */
.fondo-oscuro-carta {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  transition: background 0.5s ease;
  z-index: 900;
  pointer-events: none;
}
.fondo-oscuro-carta.visible {
  background: rgba(0,0,0,0.8);
}

#btnSiguienteSobre {
  display: none;
  max-width: 280px;
  margin-top: 2.5rem;
}
#btnSiguienteSobre.visible { display: block; }

.btn-cerrar-carta {
  position: fixed;
  top: 12%;
  left: 50%;
  /* Desplazamos desde el centro hasta la esquina superior derecha de la carta ampliada.
     El ancho de la carta en zoom es 190px * 1.9 ≈ 360px, así que la mitad es 180px */
  transform: translate(calc(-50% + 180px), 0) scale(0.7);
  z-index: 960;
  width: 2.6rem;
  height: 2.6rem;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  font-size: 1.2rem;
  line-height: 1;
  padding: 0;
  margin: 0;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.btn-cerrar-carta.visible {
  display: flex;
  opacity: 1;
  pointer-events: auto;
  transform: translate(calc(-50% + 180px), 0) scale(1);
}

@media (max-width: 600px) {
  /* En móvil la carta ampliada mide 160px * 1.7 ≈ 272px, mitad ≈ 136px */
  .btn-cerrar-carta,
  .btn-cerrar-carta.visible {
    transform: translate(calc(-50% + 136px), 0) scale(1);
  }
  .btn-cerrar-carta {
    transform: translate(calc(-50% + 136px), 0) scale(0.7);
    top: 15%;
  }
}

/* Animación de cierre: el papel se dobla y la carta "vuela" hacia el espectador
   (se encoge y desciende, como si se guardara), siempre partiendo del centro real */
.escena-sobre.cerrando .carta-doblada {
  transition: left 0.55s cubic-bezier(0.55,0,0.85,0.35),
              top 0.55s cubic-bezier(0.55,0,0.85,0.35),
              transform 0.55s cubic-bezier(0.55,0,0.85,0.35),
              height 0.5s ease-in 0.05s,
              opacity 0.4s ease 0.25s;
}
.escena-sobre.cerrando.tirando .carta-doblada {
  top: 120%;
  transform: translate(-50%, -50%) scale(0.2);
  height: 24px;
  opacity: 0;
}

@media (max-width: 600px) {
  .escena-sobre { width: 220px; height: 160px; }
  .sobre-solapa { border-left-width: 110px; border-right-width: 110px; border-top-width: 76px; }
  .carta-doblada { width: 160px; }
  .escena-sobre.abierta .carta-doblada { height: 190px; transform: translate(-50%, -75px) scaleY(1); }
  .escena-sobre.zoom .carta-doblada { left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1.7); }
}
/* ---------- MAZOS ---------- */
 
  .nombre-turno { text-align: center; font-size: 1.4rem; font-weight: 600; margin: 0.6rem 0 1.2rem; }

  .footer-link { text-align: center; margin-top: 1.5rem; }
  .footer-link a { color: #666; font-size: 0.8rem; }

/* ---------- MAZOS EN FORMA DE CARTA ---------- */
.mazos-contenedor {
  display: flex;
  flex-wrap: wrap;
  gap: 1.2rem;
  align-items: center;
  justify-content: center;
}

/* Escritorio / portátil: cartas más grandes */
@media (min-width: 601px) {
  .mazo-carta-flip { width: 190px; height: 266px; }
  .mazo-frente { padding: 1rem; gap: 0.6rem; }
  .mazo-frente .texto { font-size: 1rem; line-height: 1.25; }
  .mazo-frente .tipo { font-size: 0.75rem; }
}

/* Móvil: 2 cartas por fila, la 3ª cae debajo centrada */

  .mazos-contenedor {
    gap: 0.8rem;
    max-width: calc(2 * 128px + 0.8rem); /* ancho justo para 2 cartas */

  }

  .mazo-frente { padding: 0.7rem; }
  .mazo-frente .texto { font-size: 0.75rem; line-height: 1.2; }
  .mazo-frente .tipo { font-size: 0.62rem; }

  #vista-menu { padding: 0.6rem; }
  #vista-menu h1 { font-size: 1rem; margin-bottom: 0.3rem; }
  .avatar-turno { width: 60px; height: 60px; margin-bottom: 0.3rem; }
  .nombre-turno { font-size: 1.1rem; margin: 0.2rem 0 0.5rem; }
  #btnSiguienteTurno { margin-top: 0.5rem; }
}

/* ---------- ICONO VER CARTA + VISOR REUTILIZABLE ---------- */
.icono-ver-carta {
  width: 62px;
  height: 62px;
  margin: 1.2rem auto 0;
  background: #e0e0e0;
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.35);
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}
.icono-ver-carta img {
  width: 60%;
  height: 60%;
  object-fit: contain;
  pointer-events: none;
}
.icono-ver-carta:active {
  transform: scale(0.88);
  box-shadow: 0 2px 5px rgba(0,0,0,0.35);
}

.mensaje-turno-bloqueado {
  text-align: center;
  color: #ff6b81;
  font-weight: 600;
  margin: 1rem 0 0.5rem;
  font-size: 1.05rem;
}

.carta-visor {
  position: fixed;
  left: var(--visor-x, 50%);

  transform: translate(-50%, 0) scaleY(0.15);

  border-radius: 4px;

  box-shadow: 0 6px 14px rgba(0,0,0,0.35);

}
.carta-visor img { width: 100%; height: 100%; object-fit: cover; display: block; }

.visor-carta.abierta .carta-visor,
.visor-carta.zoom .carta-visor,
.visor-carta.cerrando .carta-visor { opacity: 1; }

.visor-carta.abierta .carta-visor { transform: translate(-50%, -90px) scaleY(1); height: 230px; }.visor-carta.zoom .carta-visor {

.visor-carta.cerrando .carta-visor {

}

@media (max-width: 600px) {

 /* ---------- PERSONALIZACION POR PERSONAJE ---------- */

 .avatar-turno {

}
.avatar-turno img { width: 100%; height: 100%; object-fit: cover; }

/* ---------- MAZOS INDIVIDUALES CON FLIP PROPIO ---------- */
.mazo-carta-flip {
  perspective: 1000px;
  cursor: pointer;
}
.mazo-interior {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1);
  transform-style: preserve-3d;
}
.mazo-carta-flip.girada .mazo-interior { transform: rotateY(180deg); }

.mazo-cara {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 12px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
}
.mazo-dorso {

.mazo-frente {

/* Las cartas NO giradas se vuelven semitransparentes y no se pueden volver a pulsar */
.mazos-contenedor.desactivado .mazo-carta-flip:not(.girada) {
  opacity: 0.4;
}

/* Bloqueamos los clics en todo el contenedor, pero la carta girada se queda 100% opaca */
.mazos-contenedor.desactivado .mazo-carta-flip {
  pointer-events: none;
}
.mazo-carta-flip.girada {
  opacity: 1 !important;
}

#btnSiguienteTurno { display: none; }
#btnSiguienteTurno.visible { display: block; }
 
/* ---------- BARRIDO NEGRO ---------- */
.barrido-negro {
  position: fixed;
  inset: 0;
  /* Eliminamos background-color: #000; para que no se vea negro sólido */
  background-color: #000; 
  background-size: cover;      /* Asegura que la imagen cubra toda la pantalla */
  background-position: center; /* Centra la imagen */
  background-repeat: no-repeat;
  z-index: 2000;
  transform: scaleX(0);
  transform-origin: left;
  pointer-events: none;
}
 
.barrido-negro.entrando {
  animation: barridoEntra 0.4s ease-in forwards;
}
.barrido-negro.saliendo {
  transform-origin: right;
  animation: barridoSale 0.4s ease-in forwards;
}
@keyframes barridoEntra {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}
@keyframes barridoSale {
  from { transform: scaleX(1); }
  to { transform: scaleX(0); }
}

<script>
// =============================================================================
// 1. CONFIGURACIÓN GENERAL Y UTILIDADES
// =============================================================================
function esMovilVertical() {
  return window.matchMedia("(orientation: portrait)").matches;
}

// =============================================================================
// 2. VISTA BIENVENIDA (Fondos, rotación y transición inicial)
// =============================================================================
const IMG_BIENVENIDA_ESCRITORIO = ["bienvenida/portatil1.png", "bienvenida/portatil2.png", "bienvenida/portatil3.png", "bienvenida/portatil4.png", "bienvenida/portatil5.png", "bienvenida/portatil6.png", "bienvenida/portatil7.png", "bienvenida/portatil8.png", "bienvenida/portatil9.png", "bienvenida/portatil10.png", "bienvenida/portatil11.png", "bienvenida/portatil12.png"];
const IMG_BIENVENIDA_MOVIL = ["bienvenida/movil1.png","bienvenida/movil2.png","bienvenida/movil3.png","bienvenida/movil4.png","bienvenida/movil5.png","bienvenida/movil6.png","bienvenida/movil7.png","bienvenida/movil8.png","bienvenida/movil9.png"];
const SEGUNDOS_ENTRE_CAMBIOS = 6;

let indiceFondoBienvenida = 0;
let intervaloFondoBienvenida = null;

// Precarga de imágenes para evitar parpadeos
function precargarImagenes(lista) {
  lista.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}
precargarImagenes(IMG_BIENVENIDA_ESCRITORIO);
precargarImagenes(IMG_BIENVENIDA_MOVIL);

// Configura el fondo inicial modificando la variable CSS
function configurarFondoBienvenida() {
  const vista = document.getElementById("vista-bienvenida");
  const lista = esMovilVertical() ? IMG_BIENVENIDA_MOVIL : IMG_BIENVENIDA_ESCRITORIO;
  vista.style.setProperty('--fondo-bienvenida', `url("${lista[indiceFondoBienvenida % lista.length]}")`);
}

// Rotación usando variables CSS para evitar recálculos de tamaño (adiós zoom raro)
function iniciarRotacionFondoBienvenida() {
  if (intervaloFondoBienvenida) clearInterval(intervaloFondoBienvenida);
  
  intervaloFondoBienvenida = setInterval(() => {
    indiceFondoBienvenida++;
    const vista = document.getElementById("vista-bienvenida");
    const lista = esMovilVertical() ? IMG_BIENVENIDA_MOVIL : IMG_BIENVENIDA_ESCRITORIO;
    const nuevaImagen = lista[indiceFondoBienvenida % lista.length];
    
    // 1. Precarga en memoria
    const imgTemporal = new Image();
    imgTemporal.src = nuevaImagen;
    
imgTemporal.onload = function() {
      // 2. Colocamos la imagen nueva en la capa superior (aún invisible)
      vista.style.setProperty('--fondo-bienvenida-next', `url("${nuevaImagen}")`);
      void vista.offsetWidth; // fuerza al navegador a registrar el cambio antes de animar

      // 3. Hacemos aparecer la capa superior encima de la actual (crossfade real)
      vista.classList.add("cambiando-fondo");

      setTimeout(() => {
        // 4. La capa de abajo pasa a tener ya la imagen nueva
        vista.style.setProperty('--fondo-bienvenida', `url("${nuevaImagen}")`);
        // 5. Ocultamos la capa superior: como abajo ya es la misma imagen, no se nota nada
        vista.classList.remove("cambiando-fondo");
      }, 600);
    };

  }, SEGUNDOS_ENTRE_CAMBIOS * 1000);
}
// Evento de click para entrar
document.getElementById("vista-bienvenida").addEventListener("click", () => {
  if (intervaloFondoBienvenida) clearInterval(intervaloFondoBienvenida);
  if (typeof musica !== 'undefined') {
      musica.play().catch(() => {});
      btnMusica.classList.remove("silenciado");
      btnMusica.classList.add("visible");
  }
  transicionABarrido(() => { mostrarVista("config"); });
});

// Lanzamiento inicial
configurarFondoBienvenida();
iniciarRotacionFondoBienvenida();

// =============================================================================
// 3. VISTA CONFIGURACIÓN (Gestión de jugadores, nombres y personajes)
// =============================================================================
let estado = cargarEstado();
const VENTAJAS = ["Avanza dos casillas", "Repite turno", "Inmune a la próxima desventaja", "Roba una carta a otro jugador", "Elige tu próxima casilla", "Doble puntos esta ronda"];
const DESVENTAJAS = ["Pierdes un turno", "Retrocede tres casillas", "Vuelve a la casilla de salida", "No puedes hablar hasta tu próximo turno", "Cambia de sitio con otro jugador"];
const DORSOS_MAZO = {
  ventaja: "cartas/dorso-prismo.png",
  desventaja: "cartas/dorso-lich.png",
  caracol: "cartas/dorso-caracol.png"
};
 
function cargarEstado() { const g = localStorage.getItem("estadoJuegoTurnos"); return g ? JSON.parse(g) : null; }
function guardarEstado() { localStorage.setItem("estadoJuegoTurnos", JSON.stringify(estado)); }
function mezclar(arr) { return arr.map(v => [Math.random(), v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }

function mostrarVista(id) {
  document.querySelectorAll(".vista").forEach(v => v.classList.remove("activa"));
  document.getElementById("vista-" + id).classList.add("activa");
}

const camposNombres = document.getElementById("camposNombres");
const btnListo = document.getElementById("btnListo");

function finalizarConfiguracion() {
  const jugadores = [];
  document.querySelectorAll(".jugador-config").forEach((wrap, i) => {
    const nombre = wrap.querySelector("input").value.trim() || ("Jugador " + (i + 1));
    const seleccionado = wrap.querySelector(".personaje-avatar.seleccionado");
    const personaje = seleccionado ? seleccionado.dataset.personaje : null;
    jugadores.push({ id: i, nombre, personaje });
  });

estado = {
    jugadores, turnoIndex: 0,
    poolVentaja: mezclar([...VENTAJAS]),
    poolDesventaja: mezclar([...DESVENTAJAS]),
    poolCaracol: mezclar([...VENTAJAS.map(t=>({texto:t,tipo:"Ventaja"})), ...DESVENTAJAS.map(t=>({texto:t,tipo:"Desventaja"}))]),
    efectosJugadores: {}
  };
  guardarEstado();

  const primerJugador = estado.jugadores[0];
  const personajePrimero = PERSONAJES.find(p => p.id === primerJugador.personaje);

  presentacionIndex = 0;
 transicionABarrido(() => { irAComicIntro(); }, personajePrimero ? personajePrimero.color : null);
}

// Ahora sí, fuera de la función, añadimos los eventos:
btnListo.addEventListener("click", finalizarConfiguracion);
btnListo.addEventListener("touchstart", (e) => { e.preventDefault(); finalizarConfiguracion(); }, { passive: false });
// Gestión de Temas y Vídeos de fondo
const VIDEOS_CONFIG_ESCRITORIO = ["iniciopc/fondopc.mp4"];
const VIDEOS_CONFIG_MOVIL = ["iniciomovil/fondo1-movil.mp4.mp4", "iniciomovil/fondo2-movil.mp4.mp4", "iniciomovil/fondo3-movil.mp4.mp4", "iniciomovil/fondo4-movil.mp4.mp4", "iniciomovil/fondo5-movil.mp4.mp4", "iniciomovil/fondo6-movil.mp4.mp4"];

function aplicarTemaSegunVideo(idVista, videoEl) {
  const vista = document.getElementById(idVista);
  if (!vista || !videoEl) return;
  const canvas = document.createElement("canvas");
  canvas.width = 24; canvas.height = 24;
  const ctx = canvas.getContext("2d");
  try {
    ctx.drawImage(videoEl, 0, 0, 24, 24);
    const datos = ctx.getImageData(0, 0, 24, 24).data;
    let total = 0;
    for (let i = 0; i < datos.length; i += 4) total += 0.299 * datos[i] + 0.587 * datos[i + 1] + 0.114 * datos[i + 2];
    const brillo = total / 576;
    vista.className = vista.className.replace(/tema-(claro|oscuro)/g, "") + (brillo > 150 ? " tema-claro" : " tema-oscuro");
  } catch (e) { vista.classList.add("tema-oscuro"); }
}

function configurarFondoConfig() {
  const video = document.getElementById("fondoVideoConfig");
  video.src = esMovilVertical() ? VIDEOS_CONFIG_MOVIL[Math.floor(Math.random()*VIDEOS_CONFIG_MOVIL.length)] : VIDEOS_CONFIG_ESCRITORIO[0];
  video.muted = true; video.load(); video.play().catch(() => {});
  video.addEventListener("loadeddata", () => aplicarTemaSegunVideo("vista-config", video), { once: true });
}

configurarFondoConfig();

// Música
const musica = document.getElementById("musicaFondo");
const btnMusica = document.getElementById("btnMusica");
btnMusica.addEventListener("click", () => {
  if (musica.paused) { musica.play(); btnMusica.classList.remove("silenciado"); } 
  else { musica.pause(); btnMusica.classList.add("silenciado"); }
});

// Lógica de Jugadores
let totalJugadores = 2;
const PERSONAJES = [
  {id:"finn", nombre:"Finn", img:"personajes/finn.png", color:"#88c6fa", fondoTurnoPC:"fondos-turno/pc/finn.jpg", fondoTurnoMovil:"fondos-turno/movil/finn.jpg", carta:"cartas-personaje/finn.jpg"},  
  {id:"jake", nombre:"Jake", img:"personajes/jake.png", color:"#febb36", fondoTurnoPC:"fondos-turno/pc/jake.jpg", fondoTurnoMovil:"fondos-turno/movil/jake.jpg", carta:"cartas-personaje/jake.jpg"},
  {id:"dulce", nombre:"Princesa chicle", img:"personajes/dulceprincesa.png", color:"#edc7dc", fondoTurnoPC:"fondos-turno/pc/princesachicle.jpg", fondoTurnoMovil:"fondos-turno/movil/princesachicle.jpg", carta:"cartas-personaje/dulce.jpg"},
  {id:"marceline", nombre:"Marceline", img:"personajes/marceline.png", color:"#b2ccd2", fondoTurnoPC:"fondos-turno/pc/marceline.jpg", fondoTurnoMovil:"fondos-turno/movil/marceline.jpg", carta:"cartas-personaje/marceline.jpg"},
  {id:"reyhielo", nombre:"Rey Hielo", img:"personajes/reyhielo.png", color:"#a5c5fc", fondoTurnoPC:"fondos-turno/pc/reyhielo.jpg", fondoTurnoMovil:"fondos-turno/movil/reyhielo.jpg", carta:"cartas-personaje/reyhielo.jpg"},
  {id:"bmo", nombre:"BMO", img:"personajes/bmo.png", color:"#c4e4cf", fondoTurnoPC:"fondos-turno/pc/bmo.jpg", fondoTurnoMovil:"fondos-turno/movil/bmo.jpg", carta:"cartas-personaje/bmo.jpg"},
  {id:"princesallama", nombre:"Princesa Llama", img:"personajes/princesallama.png", color:"#ff8555", fondoTurnoPC:"fondos-turno/pc/princesallama.jpg", fondoTurnoMovil:"fondos-turno/movil/princesallama.jpg", carta:"cartas-personaje/princesallama.jpg"},
];

 function fondoTurnoDe(personaje) {
  if (!personaje) return null;
  return esMovilVertical() ? personaje.fondoTurnoMovil : personaje.fondoTurnoPC;
}
 
function crearCampoNombre(indice) {
  const wrap = document.createElement("div"); wrap.className = "jugador-config";
  const inputWrap = document.createElement("div"); inputWrap.className = "campo-nombre-wrap";
  const input = document.createElement("input"); input.placeholder = "Nombre jugador " + (indice + 1);
  inputWrap.appendChild(input);
  if (indice >= 2) {
    const btnQuitar = document.createElement("button"); btnQuitar.className = "btn-quitar-jugador"; btnQuitar.textContent = "✕"; btnQuitar.type = "button";
    inputWrap.appendChild(btnQuitar);
  }
  wrap.appendChild(inputWrap);
  const grid = document.createElement("div"); grid.className = "personajes-grid";
  PERSONAJES.forEach(p => {
    const btn = document.createElement("button"); btn.type = "button"; btn.className = "personaje-avatar"; btn.dataset.personaje = p.id;
    btn.innerHTML = `<span class="icono-circular"><img src="${p.img}" alt="${p.nombre}"></span><span>${p.nombre}</span>`;
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);
  return wrap;
}

camposNombres.addEventListener("click", (e) => {
  const btn = e.target.closest(".btn-quitar-jugador");
  if (btn) {
    btn.closest(".jugador-config").remove();
    totalJugadores--;
    actualizarBotonAgregar();
    renombrarPlaceholders();
    actualizarDisponibilidadPersonajes();
  }
  const avatar = e.target.closest(".personaje-avatar");
  if (avatar && !avatar.classList.contains("ocupado")) {
    const grid = avatar.closest(".personajes-grid");
    const ya = avatar.classList.contains("seleccionado");
    grid.querySelectorAll(".personaje-avatar").forEach(b => b.classList.remove("seleccionado"));
    if (!ya) avatar.classList.add("seleccionado");
    actualizarDisponibilidadPersonajes();
  }
});

function actualizarDisponibilidadPersonajes() {
  const grids = camposNombres.querySelectorAll(".personajes-grid");
  const elegidos = Array.from(grids).map(g => g.querySelector(".personaje-avatar.seleccionado")?.dataset.personaje).filter(Boolean);
  grids.forEach(grid => grid.querySelectorAll(".personaje-avatar").forEach(btn => btn.classList.toggle("ocupado", elegidos.includes(btn.dataset.personaje) && !btn.classList.contains("seleccionado"))));
}

function renombrarPlaceholders() { camposNombres.querySelectorAll("input").forEach((input, i) => input.placeholder = "Nombre jugador " + (i + 1)); }
function actualizarBotonAgregar() { document.getElementById("btnAgregarJugador").style.display = totalJugadores >= 6 ? "none" : "block"; }
function actualizarCamposNombres() {
  const actuales = camposNombres.querySelectorAll(".jugador-config").length;
  if (actuales < totalJugadores) {
    // Solo añadimos los campos nuevos que faltan, sin tocar los existentes
    for (let i = actuales; i < totalJugadores; i++) camposNombres.appendChild(crearCampoNombre(i));
  } else if (actuales > totalJugadores) {
    // Quitamos campos sobrantes empezando por el final
    const wraps = camposNombres.querySelectorAll(".jugador-config");
    for (let i = actuales - 1; i >= totalJugadores; i--) wraps[i].remove();
  }
  actualizarBotonAgregar();
}
 
document.getElementById("btnAgregarJugador").addEventListener("click", () => { if (totalJugadores < 6) { totalJugadores++; actualizarCamposNombres(); } });
actualizarCamposNombres();

// =============================================================================
// 3.4 VISTA COMIC (viñetas dinámicas antes del sobre de cada jugador)
// =============================================================================
// Intro general del juego: se reproduce UNA sola vez, justo después de
// configurar a los jugadores y antes de repartir el primer sobre.
const COMIC_INTRO = [
  { imagen: "comic/intro-1.png", texto: "El sol ha salido sobre las Tierras de Ooo, pero no es una mañana cualquiera." },
  { imagen: "comic/intro-2.png", texto: "Nuestros amigos se han despertado para descubrir, con gran desconcierto, que objetos de gran valor han desaparecido sin dejar rastro." },
  { imagen: "comic/intro-3.png", texto: "La urgencia es real: los aventureros deben recuperar lo perdido antes de que el caos se apodere de Ooo." }
];

// Viñetas por personaje (opcional). Si un personaje no tiene entrada aquí,
// se salta el cómic individual y va directo al sobre.
// Estructura esperada: lista de viñetas, cada una con la imagen de la
// pose/expresión del personaje y el texto del bocadillo.
const COMICS = {
  // finn: [
  //   { imagen: "comic/finn-1.png", texto: "..." },
  // ],
};
const COMIC_FONDO_POR_DEFECTO = "comic/fondo-generico.jpg";

let comicEstadoActual = null; // { viñetas, indice, onFinish }

const vistaComic = document.getElementById("vista-comic");
const comicFondo = document.getElementById("comicFondo");
const comicPersonaje = document.getElementById("comicPersonaje");
const comicBocadillo = document.getElementById("comicBocadillo");
const comicTexto = document.getElementById("comicTexto");

function reproducirComic(viñetas, fondo, onFinish) {
  comicEstadoActual = { viñetas, indice: 0, onFinish };
  mostrarVista("comic");
  comicFondo.style.backgroundImage = `url("${fondo}")`;
  mostrarViñetaComic(viñetas, 0, false); // false = sin animación de salida previa
}

function mostrarViñetaComic(viñetas, indice, animarSalida) {
  const v = viñetas[indice];

  const dibujarNueva = () => {
    // Golpe seco: cambiamos la imagen sin transición y añadimos el jitter
    comicPersonaje.src = v.imagen;
    comicPersonaje.classList.remove("golpe");
    void comicPersonaje.offsetWidth;
    comicPersonaje.classList.add("golpe");

    comicTexto.textContent = v.texto;
    comicBocadillo.classList.remove("saliendo");
    comicBocadillo.classList.add("entrando");
  };

  if (animarSalida) {
    comicBocadillo.classList.remove("entrando");
    comicBocadillo.classList.add("saliendo");
    setTimeout(dibujarNueva, 280); // coincide con la duración de salidaBocadillo
  } else {
    dibujarNueva();
  }
}

vistaComic.addEventListener("click", () => {
  if (!comicEstadoActual) return;
  comicEstadoActual.indice++;
  const { viñetas, indice, onFinish } = comicEstadoActual;
  if (indice < viñetas.length) {
    mostrarViñetaComic(viñetas, indice, true);
  } else {
    comicEstadoActual = null;
    onFinish();
  }
});

// Intro general: se reproduce una sola vez y al terminar pasa al cómic
// (o directo al sobre) del primer jugador.
function irAComicIntro() {
  reproducirComic(COMIC_INTRO, COMIC_FONDO_POR_DEFECTO, () => { irAComicJugador(0); });
}

// Cómic individual de cada jugador (si tiene viñetas configuradas en COMICS).
function irAComicJugador(indice) {
  const jugador = estado.jugadores[indice];
  const personaje = PERSONAJES.find(p => p.id === jugador.personaje);
  const viñetas = (personaje && COMICS[personaje.id]) ? COMICS[personaje.id] : null;

  // Si no hay viñetas configuradas para este personaje, saltamos directo al sobre
  if (!viñetas || viñetas.length === 0) {
    irASobreJugador(indice);
    return;
  }

  reproducirComic(viñetas, COMIC_FONDO_POR_DEFECTO, () => { irASobreJugador(indice); });
}
 
// =============================================================================
// 3.5 VISTA SOBRE (Presentación de cada jugador con su carta)
// =============================================================================
let presentacionIndex = 0;

const escenaSobre = document.getElementById("escenaSobre");
const sobreEl = document.getElementById("sobreEl");
const btnSiguienteSobre = document.getElementById("btnSiguienteSobre");
const fondoOscuroCarta = document.getElementById("fondoOscuroCarta");
const btnCerrarCarta = document.getElementById("btnCerrarCarta");

function actualizarPosicionCartaSobre() {
  // Calculamos en píxeles reales dónde está el sobre en la pantalla,
  // para que la carta "nazca" justo ahí antes de centrarse en el zoom.
  const rect = escenaSobre.getBoundingClientRect();
  const offsetTop = esMovilVertical() ? 50 : 60;
  document.documentElement.style.setProperty('--carta-x', (rect.left + rect.width / 2) + 'px');
  document.documentElement.style.setProperty('--carta-y', (rect.top + offsetTop) + 'px');
}

function irASobreJugador(indice) {
  mostrarVista("sobre");
  actualizarPosicionCartaSobre();

  const jugador = estado.jugadores[indice];
  const personaje = PERSONAJES.find(p => p.id === jugador.personaje);

  document.getElementById("tituloSobre").textContent = "Toca el sobre, " + jugador.nombre;
  document.getElementById("imgCartaSobre").src = personaje ? personaje.carta : "";
  document.getElementById("vista-sobre").style.backgroundColor = personaje ? personaje.color : "";

  // Reiniciamos el estado visual del sobre
  escenaSobre.classList.remove("abierta", "zoom", "cerrando", "tirando");
  sobreEl.classList.remove("abierto");
  fondoOscuroCarta.classList.remove("visible");
  btnSiguienteSobre.classList.remove("visible");
  btnCerrarCarta.classList.remove("visible");
}

function abrirSobre() {
  if (sobreEl.classList.contains("abierto")) return; // evita abrir dos veces

  // Paso 1: se abre la solapa
  sobreEl.classList.add("abierto");

  // Paso 2: la carta se despliega y sale del sobre
  setTimeout(() => {
    escenaSobre.classList.add("abierta");
  }, 450);

 // Paso 3: zoom para verla bien grande, con fondo oscurecido
  setTimeout(() => {
    escenaSobre.classList.add("zoom");
    fondoOscuroCarta.classList.add("visible");
    btnCerrarCarta.classList.add("visible");
  }, 450 + 700);
}

function cerrarCarta() {
  if (!escenaSobre.classList.contains("zoom")) return; // solo si está abierta

  btnCerrarCarta.classList.remove("visible");
  fondoOscuroCarta.classList.remove("visible");

  // Preparamos las transiciones de cierre
  escenaSobre.classList.remove("zoom");
  escenaSobre.classList.add("cerrando");

  // Un frame después disparamos el estado final para que SÍ anime
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      escenaSobre.classList.add("tirando");
    });
  });

  // Cuando termina la animación de guardado, mostramos "Siguiente jugador"
  setTimeout(() => {
    btnSiguienteSobre.classList.add("visible");
  }, 600);
}

sobreEl.addEventListener("click", abrirSobre);
btnCerrarCarta.addEventListener("click", cerrarCarta);

btnSiguienteSobre.addEventListener("click", () => {
  presentacionIndex++;
  if (presentacionIndex < estado.jugadores.length) {
    const siguienteJugador = estado.jugadores[presentacionIndex];
    const personajeSiguiente = PERSONAJES.find(p => p.id === siguienteJugador.personaje);
    transicionABarrido(() => { irAComicJugador(presentacionIndex); }, personajeSiguiente ? personajeSiguiente.color : null);
  } else {
    const primerJugador = estado.jugadores[0];
    const personajePrimero = PERSONAJES.find(p => p.id === primerJugador.personaje);
    transicionABarrido(() => { irAMenuTurno(); }, personajePrimero ? personajePrimero.color : null);
  }
});

// =============================================================================
// 4. VISTA JUEGO (Menú de turno y Mazos)
// =============================================================================
function actualizarAvatarTurno(jugador) {
  const vistaMenu = document.getElementById("vista-menu");
  const avatarImg = document.getElementById("imgAvatarTurno");
  const personaje = PERSONAJES.find(p => p.id === jugador.personaje);
  if (personaje) {
    avatarImg.src = personaje.img;
    avatarImg.alt = personaje.nombre;
    vistaMenu.style.backgroundColor = personaje.color;
  } else {
    avatarImg.src = "";
    avatarImg.alt = "";
    vistaMenu.style.backgroundColor = "";
  }
}

function irAMenuTurno() {
  mostrarVista("menu");
  const jugador = estado.jugadores[estado.turnoIndex % estado.jugadores.length];
  document.getElementById("nombreTurno").textContent = jugador.nombre;
  actualizarAvatarTurno(jugador);

  document.querySelectorAll(".mazo-carta-flip").forEach(c => c.classList.remove("girada"));
  document.getElementById("mazosContenedor").classList.remove("desactivado");

  const vistaMenu = document.getElementById("vista-menu");
  const mensajeBloqueado = document.getElementById("mensajeTurnoBloqueado");
  const bloqueado = !!(estado.efectosJugadores && estado.efectosJugadores[jugador.id] && estado.efectosJugadores[jugador.id].pierdeTurno);

  if (bloqueado) {
    vistaMenu.classList.add("turno-bloqueado");
    mensajeBloqueado.style.display = "block";
    document.getElementById("btnSiguienteTurno").classList.add("visible");
    delete estado.efectosJugadores[jugador.id]; // el efecto ya se ha aplicado, se consume
    guardarEstado();
  } else {
    vistaMenu.classList.remove("turno-bloqueado");
    mensajeBloqueado.style.display = "none";
    document.getElementById("btnSiguienteTurno").classList.remove("visible");
  }

  if (!musica.paused) musica.pause();
  btnMusica.classList.remove("visible");
}
function sacarCarta(mazo) {
  let tipo = "", texto = "";
  if (mazo === "ventaja") { if (estado.poolVentaja.length === 0) estado.poolVentaja = mezclar([...VENTAJAS]); texto = estado.poolVentaja.pop(); tipo = "Ventaja"; }
  else if (mazo === "desventaja") { if (estado.poolDesventaja.length === 0) estado.poolDesventaja = mezclar([...DESVENTAJAS]); texto = estado.poolDesventaja.pop(); tipo = "Desventaja"; }
  else { if (estado.poolCaracol.length === 0) estado.poolCaracol = mezclar([...VENTAJAS.map(t=>({texto:t,tipo:"Ventaja"})), ...DESVENTAJAS.map(t=>({texto:t,tipo:"Desventaja"}))]); const c = estado.poolCaracol.pop(); texto = c.texto; tipo = c.tipo; }

const cartaEl = document.querySelector(`.mazo-carta-flip[data-mazo="${mazo}"]`);
  cartaEl.querySelector(".tipo").textContent = tipo;
  cartaEl.querySelector(".texto").textContent = texto;
  cartaEl.classList.add("girada");

  document.getElementById("mazosContenedor").classList.add("desactivado");
  document.getElementById("btnSiguienteTurno").classList.add("visible");

// Efectos especiales de ciertas cartas
  const jugadorActual = estado.jugadores[estado.turnoIndex % estado.jugadores.length];
  estado.efectosJugadores = estado.efectosJugadores || {};
  estado.efectosJugadores[jugadorActual.id] = estado.efectosJugadores[jugadorActual.id] || {};

  // "Pierdes un turno" se aplica en la PRÓXIMA vez que le toque a este jugador
  if (texto === "Pierdes un turno") {
    estado.efectosJugadores[jugadorActual.id].pierdeTurno = true;
  }

  // "Repite turno" se aplica AHORA MISMO: al pulsar "Siguiente jugador" vuelve a salir él
  if (texto === "Repite turno") {
    estado.efectosJugadores[jugadorActual.id].repiteTurno = true;
  }

  guardarEstado();
}
 
document.getElementById("btnSiguienteTurno").addEventListener("click", () => {
  const jugadorActual = estado.jugadores[estado.turnoIndex % estado.jugadores.length];
  const debeRepetir = !!(estado.efectosJugadores && estado.efectosJugadores[jugadorActual.id] && estado.efectosJugadores[jugadorActual.id].repiteTurno);

  if (debeRepetir) {
    // Consumimos el efecto y NO avanzamos el turnoIndex: vuelve a salir el mismo jugador
    delete estado.efectosJugadores[jugadorActual.id].repiteTurno;
    guardarEstado();
    const personajeActual = PERSONAJES.find(p => p.id === jugadorActual.personaje);
    transicionABarrido(() => { irAMenuTurno(); }, personajeActual ? personajeActual.color : null);
    return;
  }

  estado.turnoIndex++;
  guardarEstado();
  const jugadorSiguiente = estado.jugadores[estado.turnoIndex % estado.jugadores.length];
  const personajeSiguiente = PERSONAJES.find(p => p.id === jugadorSiguiente.personaje);
  transicionABarrido(() => { irAMenuTurno(); }, personajeSiguiente ? personajeSiguiente.color : null);
});
  
 document.getElementById("btnReiniciarTodo").addEventListener("click", (e) => { e.preventDefault(); if (confirm("¿Reiniciar?")) { localStorage.removeItem("estadoJuegoTurnos"); location.reload(); } });

document.getElementById("mazosContenedor").addEventListener("click", (e) => {
  const btn = e.target.closest(".mazo-carta-flip");
  if (btn && !document.getElementById("mazosContenedor").classList.contains("desactivado")) {
    sacarCarta(btn.dataset.mazo);
  }
});

// =============================================================================
// 4.5 VISOR DE CARTA (reutilizable desde el menú, sin sobre)
// =============================================================================
const visorCarta = document.getElementById("visorCarta");
const cartaVisorDoblada = document.getElementById("cartaVisorDoblada");
const imgCartaVisor = document.getElementById("imgCartaVisor");
const fondoOscuroVisor = document.getElementById("fondoOscuroVisor");
const btnCerrarVisor = document.getElementById("btnCerrarVisor");
const btnVerCartaPersonaje = document.getElementById("btnVerCartaPersonaje");

function abrirVisorCarta() {
  if (visorCarta.classList.contains("abierta")) return;

  const jugador = estado.jugadores[estado.turnoIndex % estado.jugadores.length];
  const personaje = PERSONAJES.find(p => p.id === jugador.personaje);
  imgCartaVisor.src = personaje ? personaje.carta : "";

  const rect = btnVerCartaPersonaje.getBoundingClientRect();
  document.documentElement.style.setProperty('--visor-x', (rect.left + rect.width / 2) + 'px');
  document.documentElement.style.setProperty('--visor-y', (rect.top + rect.height / 2) + 'px');

  visorCarta.classList.remove("cerrando", "tirando", "zoom");
  void cartaVisorDoblada.offsetWidth;
  visorCarta.classList.add("abierta");

  setTimeout(() => {
    visorCarta.classList.add("zoom");
    fondoOscuroVisor.classList.add("visible");
    btnCerrarVisor.classList.add("visible");
  }, 700);
}

function cerrarVisorCarta() {
  if (!visorCarta.classList.contains("zoom")) return;

  btnCerrarVisor.classList.remove("visible");
  fondoOscuroVisor.classList.remove("visible");

  visorCarta.classList.remove("zoom");
  visorCarta.classList.add("cerrando");

  requestAnimationFrame(() => {
    requestAnimationFrame(() => { visorCarta.classList.add("tirando"); });
  });

  setTimeout(() => {
    visorCarta.classList.remove("abierta", "cerrando", "tirando");
  }, 650);
}

btnVerCartaPersonaje.addEventListener("click", abrirVisorCarta);
btnCerrarVisor.addEventListener("click", cerrarVisorCarta);

// =============================================================================
// 5. TRANSICIONES (Barrido negro) - CÓDIGO CORREGIDO
// =============================================================================
function transicionABarrido(callback, colorBarrido) {
  const barrido = document.getElementById("barridoNegro");

  // Limpiamos clases antes de empezar
  barrido.classList.remove("entrando", "saliendo");
  void barrido.offsetWidth; // Truco técnico para reiniciar la animación

  barrido.style.backgroundImage = "none";
  barrido.style.backgroundColor = colorBarrido || "#000";

  barrido.classList.add("entrando");

  // Esperamos a que termine el barrido (400ms)
  setTimeout(() => {
    callback();
    barrido.classList.remove("entrando");
    barrido.classList.add("saliendo");

    // Al terminar el barrido de salida, limpiamos
    setTimeout(() => {
      barrido.classList.remove("saliendo");
    }, 400);
  }, 400);
}
